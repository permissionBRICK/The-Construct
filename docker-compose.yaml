services:
  agent:
    build:
      context: ./agent-runtime
    image: ${AGENT_IMAGE:-construct-local:latest}
    container_name: construct
    restart: unless-stopped
    env_file:
      - /etc/construct/config.env
      - /opt/construct/runtime/generated.env
    volumes:
      - ${WORKSPACE_ROOT:-/root/repos}:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
      - ./projects:/opt/construct/projects:ro
      - /opt/construct/runtime:/opt/construct/runtime:ro
    working_dir: /workspaces
