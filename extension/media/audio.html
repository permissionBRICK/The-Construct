<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Hidden capture webview. Loaded off-screen by the extension purely to reach
       getUserMedia (a webview is the only surface in a UI extension that can open
       the local mic). No visible UI. Audio never touches the network — it leaves via
       postMessage to the extension — so connect-src is limited to blob: (a
       defensive allowance for the audio pipeline; no remote origin is permitted).
       The AudioWorklet module is loaded from the extension's media root
       ({{cspSource}}); worklets are fetched under worker-src, so it is allowed there
       (plus blob: which some engines use for module URLs). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'nonce-{{nonce}}' {{cspSource}}; worker-src {{cspSource}} blob:; connect-src {{cspSource}} blob:;" />
  <title>Construct — mic capture</title>
</head>
<body>
<script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
