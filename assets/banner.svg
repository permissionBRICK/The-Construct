<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" role="img" aria-label="The Construct">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#04120a"/>
      <stop offset="55%" stop-color="#020a06"/>
      <stop offset="100%" stop-color="#010503"/>
    </linearGradient>
    <linearGradient id="rainFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0"/>
      <stop offset="35%" stop-color="#00ff66" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00ff66" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .rain {
        font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, monospace;
        font-size: 15px;
        fill: url(#rainFade);
        letter-spacing: 2px;
      }
      .flicker-a { animation: flicker 3.2s ease-in-out infinite; }
      .flicker-b { animation: flicker 4.1s ease-in-out infinite 1.1s; }
      .flicker-c { animation: flicker 5.3s ease-in-out infinite 2.2s; }
      @keyframes flicker {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 0.25; }
      }
      .title {
        font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, monospace;
        font-size: 64px;
        font-weight: 700;
        letter-spacing: 10px;
        fill: #d8ffe8;
      }
      .subtitle {
        font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, monospace;
        font-size: 17px;
        letter-spacing: 4px;
        fill: #35e07f;
      }
      .prompt {
        font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, monospace;
        font-size: 14px;
        fill: #1e9c58;
        letter-spacing: 1px;
      }
      .cursor { animation: blink 1.2s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <rect width="1000" height="260" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="999" height="259" rx="12" fill="none" stroke="#0f3d24" stroke-width="1"/>

  <!-- digital rain -->
  <g class="rain" aria-hidden="true">
    <text class="flicker-a" transform="translate(38,-6)"><tspan x="0" dy="22">ﾊ</tspan><tspan x="0" dy="22">7</tspan><tspan x="0" dy="22">ﾘ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ﾂ</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">2</tspan><tspan x="0" dy="22">ﾅ</tspan><tspan x="0" dy="22">ｦ</tspan><tspan x="0" dy="22">9</tspan><tspan x="0" dy="22">ﾓ</tspan><tspan x="0" dy="22">1</tspan></text>
    <text class="flicker-b" transform="translate(86,4)"><tspan x="0" dy="22">3</tspan><tspan x="0" dy="22">ｳ</tspan><tspan x="0" dy="22">ﾆ</tspan><tspan x="0" dy="22">ﾊ</tspan><tspan x="0" dy="22">8</tspan><tspan x="0" dy="22">ｵ</tspan><tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">5</tspan><tspan x="0" dy="22">ﾜ</tspan><tspan x="0" dy="22">ｻ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ﾘ</tspan></text>
    <text class="flicker-c" transform="translate(134,-12)"><tspan x="0" dy="22">ﾓ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">ﾂ</tspan><tspan x="0" dy="22">4</tspan><tspan x="0" dy="22">ﾅ</tspan><tspan x="0" dy="22">ｦ</tspan><tspan x="0" dy="22">7</tspan><tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">2</tspan><tspan x="0" dy="22">ｳ</tspan><tspan x="0" dy="22">ﾐ</tspan></text>
    <text class="flicker-b" transform="translate(182,0)" opacity="0.5"><tspan x="0" dy="22">ｵ</tspan><tspan x="0" dy="22">6</tspan><tspan x="0" dy="22">ﾜ</tspan><tspan x="0" dy="22">ﾘ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ｻ</tspan><tspan x="0" dy="22">ﾊ</tspan><tspan x="0" dy="22">9</tspan><tspan x="0" dy="22">ﾆ</tspan><tspan x="0" dy="22">3</tspan><tspan x="0" dy="22">ﾓ</tspan><tspan x="0" dy="22">ｼ</tspan></text>
    <text class="flicker-a" transform="translate(818,2)" opacity="0.5"><tspan x="0" dy="22">ﾅ</tspan><tspan x="0" dy="22">4</tspan><tspan x="0" dy="22">ｦ</tspan><tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">8</tspan><tspan x="0" dy="22">ﾂ</tspan><tspan x="0" dy="22">ｳ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ﾘ</tspan><tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">5</tspan><tspan x="0" dy="22">ｵ</tspan></text>
    <text class="flicker-c" transform="translate(866,-8)"><tspan x="0" dy="22">2</tspan><tspan x="0" dy="22">ﾓ</tspan><tspan x="0" dy="22">ｻ</tspan><tspan x="0" dy="22">ﾜ</tspan><tspan x="0" dy="22">7</tspan><tspan x="0" dy="22">ﾆ</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾊ</tspan><tspan x="0" dy="22">9</tspan><tspan x="0" dy="22">ｦ</tspan><tspan x="0" dy="22">ﾂ</tspan></text>
    <text class="flicker-a" transform="translate(914,6)"><tspan x="0" dy="22">ﾘ</tspan><tspan x="0" dy="22">5</tspan><tspan x="0" dy="22">ｳ</tspan><tspan x="0" dy="22">ﾅ</tspan><tspan x="0" dy="22">0</tspan><tspan x="0" dy="22">ﾐ</tspan><tspan x="0" dy="22">ｵ</tspan><tspan x="0" dy="22">3</tspan><tspan x="0" dy="22">ﾓ</tspan><tspan x="0" dy="22">ﾜ</tspan><tspan x="0" dy="22">8</tspan><tspan x="0" dy="22">ｻ</tspan></text>
    <text class="flicker-b" transform="translate(962,-4)" opacity="0.6"><tspan x="0" dy="22">ﾋ</tspan><tspan x="0" dy="22">1</tspan><tspan x="0" dy="22">ﾂ</tspan><tspan x="0" dy="22">ｼ</tspan><tspan x="0" dy="22">6</tspan><tspan x="0" dy="22">ﾅ</tspan><tspan x="0" dy="22">ｦ</tspan><tspan x="0" dy="22">4</tspan><tspan x="0" dy="22">ﾆ</tspan><tspan x="0" dy="22">ﾊ</tspan><tspan x="0" dy="22">2</tspan><tspan x="0" dy="22">ｳ</tspan></text>
  </g>

  <!-- wordmark -->
  <g text-anchor="middle">
    <text x="500" y="96" class="subtitle">— THIS IS —</text>
    <text x="500" y="160" class="title" filter="url(#softGlow)" fill="#00ff66" opacity="0.35">THE CONSTRUCT</text>
    <text x="500" y="160" class="title" filter="url(#glow)">THE CONSTRUCT</text>
    <text x="500" y="200" class="subtitle">OUR LOADING PROGRAM</text>
  </g>

  <!-- prompt line -->
  <text x="500" y="238" text-anchor="middle" class="prompt">root@agent-vm:~# we can load anything<tspan class="cursor"> ▍</tspan></text>
</svg>
